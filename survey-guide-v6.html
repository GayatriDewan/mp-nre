<style>
  :root {
    --dark-blue:  #1C2F62;
    --blue-3:     #264D96;
    --gold:       #D49E00;
    --gold-light: #FFF3C4;
    --green:      #0F4D42;
    --grey-bg:    #F2F2F5;
    --white:      #FFFFFF;
    --text:       #1a1a2e;
    --text-muted: #6b7280;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--grey-bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  #hdr {
    background: var(--dark-blue);
    color: var(--white);
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  #hdr svg { flex-shrink: 0; }
  #hdr-titles { display: flex; flex-direction: column; gap: 0.1rem; }
  #hdr-title  { font-size: 1.05rem; font-weight: 800; letter-spacing: 0.01em; line-height: 1.2; }
  #hdr-sub    { font-size: 0.78rem; font-weight: 400; opacity: 0.75; }

  /* ── Survey selector screen ── */
  #sel-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    gap: 1.25rem;
    min-height: calc(100vh - 56px);
  }
  #sel-screen h2 { font-size: 1.25rem; font-weight: 700; color: var(--dark-blue); text-align: center; }
  .sel-btn {
    width: 100%; max-width: 380px;
    background: var(--white);
    border: 2px solid var(--blue-3);
    color: var(--dark-blue);
    border-radius: 12px;
    padding: 1.1rem 1.5rem;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, color 0.15s;
  }
  .sel-btn:hover { background: var(--blue-3); color: var(--white); }
  .sel-btn-sub {
    display: block;
    font-size: 0.8rem;
    font-weight: 400;
    margin-top: 0.2rem;
    opacity: 0.75;
  }

  /* ── Survey view ── */
  #survey-view { display: none; padding-bottom: 3rem; }

  /* ── Question list ── */
  #qList {
    position: relative;
    padding: 1.25rem 1.25rem 2rem 68px; /* left 68px = 56px gutter + 12px gap */
    max-width: 780px;
    margin: 0 auto;
  }

  /* ── Arrow SVG overlay ── */
  #arrowSvg {
    position: absolute;
    top: 0;
    left: 0;
    width: 56px;
    pointer-events: none;
    z-index: 20;
    overflow: visible;
  }

  /* ── Question row ── */
  .q-row {
    margin-bottom: 1rem;
    transition: opacity 0.2s;
  }
  .q-row.is-answered .q-card {
    border-left: 4px solid var(--blue-3);
  }

  /* ── Question card ── */
  .q-card {
    background: var(--white);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border: 1px solid rgba(0,0,0,0.06);
  }
  .q-row.is-answered .q-card {
    border: 1px solid rgba(38,77,150,0.25);
  }

  /* ── Q-number band (top of card) ── */
  .q-band {
    background: var(--dark-blue);
    color: var(--white);
    padding: 0.5rem 1.1rem;
    font-size: 1.35rem;
    font-weight: 900;
    letter-spacing: 0.04em;
    line-height: 1;
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
  }
  .q-band-label { font-size: 0.75rem; font-weight: 500; opacity: 0.65; letter-spacing: 0.05em; text-transform: uppercase; }

  /* ── Card body ── */
  .q-body { padding: 0.9rem 1.1rem 1.1rem; }

  /* ── Question text ── */
  .q-hi { font-size: 1rem; font-weight: 700; line-height: 1.5; margin-bottom: 0.3rem; }
  .q-en { font-size: 0.82rem; font-weight: 400; color: var(--text-muted); line-height: 1.4; margin-bottom: 0.85rem; }

  /* ── Open-text ── */
  .open-text {
    width: 100%;
    min-height: 80px;
    border: 1.5px solid #d1d5db;
    border-radius: 7px;
    padding: 0.6rem 0.8rem;
    font-family: inherit;
    font-size: 0.9rem;
    color: var(--text);
    resize: vertical;
  }
  .open-text:focus { outline: none; border-color: var(--blue-3); }

  /* ── Options ── */
  .q-opts { display: flex; flex-direction: column; gap: 0.55rem; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 0.65rem;
    padding: 0.65rem 0.85rem;
    border-radius: 8px;
    border: 1.5px solid #e5e7eb;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--white);
    text-align: left;
    font-family: inherit;
  }
  .opt:hover { border-color: var(--blue-3); background: #f0f4ff; }
  .opt.sel   { border-color: var(--blue-3); background: #e8effe; }
  .opt-dot {
    width: 18px; height: 18px;
    border: 2px solid #d1d5db;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
    background: var(--white);
    transition: border-color 0.15s, background 0.15s;
  }
  .opt.sel .opt-dot { border-color: var(--blue-3); background: var(--blue-3); }
  .opt-text { flex: 1; }
  .opt-hi { font-size: 0.9rem; font-weight: 600; line-height: 1.45; }
  .opt-en { font-size: 0.76rem; font-weight: 400; color: var(--text-muted); margin-top: 0.15rem; }

  /* ── End card ── */
  .end-card {
    background: var(--dark-blue);
    color: var(--white);
    border-radius: 10px;
    padding: 1.5rem 1.5rem;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .end-card h3 { font-size: 1.15rem; font-weight: 800; margin-bottom: 0.3rem; }
  .end-card p  { font-size: 0.85rem; opacity: 0.8; margin-bottom: 1.1rem; }
  .new-btn {
    background: var(--gold);
    color: #1a1400;
    border: none;
    border-radius: 8px;
    padding: 0.6rem 1.4rem;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .new-btn:hover { opacity: 0.85; }

  /* ── Classification tags (Survey 2 end) ── */
  .tag-section { margin-top: 1.1rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 1rem; text-align: left; }
  .tag-label { font-size: 0.8rem; font-weight: 600; opacity: 0.85; margin-bottom: 0.6rem; }
  .tag-opts { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .tag-btn {
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.35);
    color: var(--white);
    border-radius: 20px;
    padding: 0.3rem 0.85rem;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .tag-btn:hover { background: rgba(255,255,255,0.25); }
  .tag-btn.sel   { background: var(--gold); border-color: var(--gold); color: #1a1400; }
</style>

/* ============================================================
   STATE
   ============================================================ */
let activeSurvey = null;
let answers      = {};       // qId → optIdx
let currentArrow = null;     // { from: qId, to: qId|'end' }
let activeTags   = new Set();

/* ============================================================
   LOAD SURVEY
   ============================================================ */
function loadSurvey(num) {
  activeSurvey = SURVEYS[num];
  answers      = {};
  currentArrow = null;
  activeTags   = new Set();

  document.getElementById('sel-screen').style.display  = 'none';
  document.getElementById('survey-view').style.display = 'block';

  renderSurvey();
}

function renderSurvey() {
  const list = document.getElementById('qList');

  // Clear except the SVG
  const svg = document.getElementById('arrowSvg');
  list.innerHTML = '';
  list.appendChild(svg);
  svg.innerHTML = '';

  const s = activeSurvey;

  // Question rows
  s.qs.forEach(q => {
    const row = document.createElement('div');
    row.className = 'q-row';
    row.id = 'row-' + q.id;
    row.innerHTML = buildQCard(q);
    list.appendChild(row);
  });

  // END row
  const endRow = document.createElement('div');
  endRow.className = 'q-row';
  endRow.id = 'row-end';
  endRow.innerHTML = buildEndCard(s);
  list.appendChild(endRow);

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function buildQCard(q) {
  if (q.isOpenText) {
    return `
      <div class="q-card" id="card-${q.id}">
        <div class="q-band">${q.num} <span class="q-band-label">notes</span></div>
        <div class="q-body">
          <div class="q-hi">${q.hi}</div>
          <div class="q-en">${q.en}</div>
          <textarea class="open-text" placeholder="Yahan likhein..." rows="4"
            onchange="markOpenDone('${q.id}', '${q.next}')"></textarea>
        </div>
      </div>`;
  }

  const opts = q.options.map((o, i) => `
    <button class="opt" id="opt-${q.id}-${i}" onclick="pickOpt('${q.id}', ${i}, '${o.next}')">
      <span class="opt-dot"></span>
      <span class="opt-text">
        <span class="opt-hi">${o.hi}</span>
        <span class="opt-en">${o.en}</span>
      </span>
    </button>`).join('');

  return `
    <div class="q-card" id="card-${q.id}">
      <div class="q-band">${q.num}</div>
      <div class="q-body">
        <div class="q-hi">${q.hi}</div>
        <div class="q-en">${q.en}</div>
        <div class="q-opts">${opts}</div>
      </div>
    </div>`;
}

function buildEndCard(s) {
  const tags = s.tags ? `
    <div class="tag-section">
      <div class="tag-label">Classification Tags (select all that apply)</div>
      <div class="tag-opts">
        ${s.tags.map(t => `<button class="tag-btn" onclick="toggleTag(this, '${t}')">${t}</button>`).join('')}
      </div>
    </div>` : '';

  return `
    <div class="end-card">
      <h3>Survey pura hua ✓</h3>
      <p>Survey complete. Start a new survey for the next respondent.</p>
      ${tags}
      <button class="new-btn" onclick="resetToSelector()" style="margin-top:1.1rem">
        Naya survey shuru karein — New Survey
      </button>
    </div>`;
}

/* ============================================================
   ANSWER SELECTION
   ============================================================ */
function pickOpt(qId, idx, nextId) {
  // Deselect previous selection for this question
  const prev = answers[qId];
  if (prev !== undefined) {
    document.getElementById(`opt-${qId}-${prev}`)?.classList.remove('sel');
  }

  // Select new
  answers[qId] = idx;
  document.getElementById(`opt-${qId}-${idx}`)?.classList.add('sel');
  document.getElementById('row-' + qId)?.classList.add('is-answered');

  // Update arrow
  currentArrow = { from: qId, to: nextId };
  drawArrow();

  // Scroll target into view after a short delay
  setTimeout(() => {
    const targetId = nextId === 'end' ? 'end' : nextId;
    const target = document.getElementById('row-' + targetId);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 120);
}

function markOpenDone(qId, nextId) {
  document.getElementById('row-' + qId)?.classList.add('is-answered');
  currentArrow = { from: qId, to: nextId };
  drawArrow();
  setTimeout(() => {
    const target = document.getElementById('row-' + nextId);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 120);
}

/* ============================================================
   GOLDEN ARROW — SVG connector
   ============================================================ */
function drawArrow() {
  const svg  = document.getElementById('arrowSvg');
  const list = document.getElementById('qList');

  // Sync SVG height with list scrollable height
  const h = list.scrollHeight;
  svg.setAttribute('height', h);
  svg.style.height = h + 'px';

  svg.innerHTML = '';

  if (!currentArrow) return;

  const { from, to } = currentArrow;

  const fromCard = document.getElementById('card-' + from);
  const toId     = to === 'end' ? 'row-end' : 'card-' + to;
  const toEl     = document.getElementById(toId);

  if (!fromCard || !toEl) return;

  // offsetTop/offsetHeight relative to #qList (the position:relative offsetParent)
  const startY = fromCard.offsetTop + fromCard.offsetHeight;
  const endY   = to === 'end' ? toEl.offsetTop + 24 : toEl.offsetTop;

  if (endY <= startY + 10) return;

  const x        = 28;
  const lineEndY = endY - 13;

  svg.innerHTML = `
    <circle cx="${x}" cy="${startY}" r="5.5" fill="#D49E00"/>
    <line
      x1="${x}" y1="${startY + 5}" x2="${x}" y2="${lineEndY}"
      stroke="#D49E00" stroke-width="3.5" stroke-linecap="round"
    />
    <polygon
      points="${x - 9},${lineEndY} ${x + 9},${lineEndY} ${x},${endY}"
      fill="#D49E00"
    />
  `;
}

/* ============================================================
   CLASSIFICATION TAGS
   ============================================================ */
function toggleTag(btn, tag) {
  btn.classList.toggle('sel');
  if (activeTags.has(tag)) activeTags.delete(tag);
  else activeTags.add(tag);
}

/* ============================================================
   RESET
   ============================================================ */
function resetToSelector() {
  activeSurvey = null;
  answers      = {};
  currentArrow = null;
  activeTags   = new Set();

  document.getElementById('survey-view').style.display  = 'none';
  document.getElementById('sel-screen').style.display   = 'flex';
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ============================================================
   REDRAW ARROW ON WINDOW RESIZE (layout reflow changes offsets)
   ============================================================ */
window.addEventListener('resize', () => { if (currentArrow) drawArrow(); });
</script>
